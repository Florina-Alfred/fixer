name: Duplicate Finder
image: python:3.11
category: find
level: intermediate
goal: "Find duplicates, empty files/dirs, special permissions"
description: |
  ## Scenario
  Find anomalies in /tmp/labs/.
  
  ## Tasks
  1. Find duplicate files → /tmp/labs/duplicates.txt
  2. Find empty dirs → /tmp/labs/empty_dirs.txt
  3. Find empty files → /tmp/labs/empty_files.txt
  4. Find world-writable → /tmp/labs/world_writable.txt
  
  ## Validation
  Run `v` to check

setup:
  - 'python3 /setup/setup.py'
validate:
  - 'python3 /validate/validate.py'
hints:
  - 'find -type d -empty'