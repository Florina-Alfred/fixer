name: Find Zombie Processes
image: python:3.11
category: find
level: intermediate
goal: "Find config files, hidden files, small files, restricted files"
description: |
  ## Scenario
  Find files in /tmp/labs/ using find command.
  
  ## Tasks
  1. Find *.yml and *.conf → /tmp/labs/config-files.txt
  2. Find hidden files → /tmp/labs/hidden-files.txt
  3. Find small files → /tmp/labs/small-files.txt
  4. Find restricted files → /tmp/labs/restricted-files.txt
  
  ## Validation
  Run `v` to check

setup:
  - 'python3 /setup/setup.py'
validate:
  - 'python3 /validate/validate.py'
hints:
  - 'find /tmp/labs -name "*.yml"'