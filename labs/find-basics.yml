name: Find Basics - Locate Hidden Files
image: alpine:latest
goal: "Find all hidden files (starting with .) in /project and save the list to /tmp/hidden.txt"
category: find
level: beginner
setup:
  - "mkdir -p /project/src /project/docs /project/.git /project/config"
  - "echo 'main code' > /project/src/main.py"
  - "echo 'utils' > /project/src/utils.py"
  - "echo 'hidden config' > /project/src/.env"
  - "echo 'readme' > /project/docs/README.md"
  - "echo 'hidden readme' > /project/docs/.hidden"
  - "echo 'git config' > /project/.git/config"
  - "echo 'git ignore' > /project/.gitignore"
  - "echo 'app settings' > /project/config/app.conf"
  - "echo 'hidden settings' > /project/config/.secrets"
checks:
  - "test -f /tmp/hidden.txt"
  - "grep -q '/project/src/.env' /tmp/hidden.txt"
  - "grep -q '/project/docs/.hidden' /tmp/hidden.txt"
  - "grep -q '/project/.git/config' /tmp/hidden.txt"
  - "grep -q '/project/.gitignore' /tmp/hidden.txt"
  - "grep -q '/project/config/.secrets' /tmp/hidden.txt"
  - "test $(wc -l < /tmp/hidden.txt) -eq 5"
hints:
  - "Use 'find' to search for files"
  - "Use '-name' to match patterns"
  - "Hidden files start with a dot: -name '.*'"
  - "Try: find /project -type f -name '.*' > /tmp/hidden.txt"
