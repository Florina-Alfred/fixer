name: CSV Extractor
image: python:3.11
category: cut
level: beginner
goal: "Extract columns from CSV files using cut"
description: |
  ## Scenario
  Extract data from /tmp/labs/employees.csv.
  
  ## Tasks
  1. Extract names → /tmp/labs/employee_names.txt
  2. Extract emails → /tmp/labs/emails.txt
  3. Extract departments → /tmp/labs/departments.txt
  
  ## Validation
  Run `v` to check

setup:
  - 'python3 /setup/setup.py'
validate:
  - 'python3 /validate/validate.py'
hints:
  - 'cut -d, -f2 /tmp/labs/employees.csv'