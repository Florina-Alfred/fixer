name: Cut Data Analysis
image: python:3.11-slim
category: cut
level: intermediate
goal: "Master cut command for data extraction from CSV and delimited files"
description: |
  Learn to use cut effectively to extract specific columns from CSV files,
  logs, and other delimited data. Real-world scenarios include employee
  databases, server logs, network traffic, and sales reports.

setup:
  - "chmod +x /setup/setup.sh && /setup/setup.sh"
validate:
  - "chmod +x /validate/validate.sh && /validate/validate.sh"
hints:
  - "Use 'cut -d DELIM -f FIELDS' to extract fields with delimiter"
  - "Use -d ',' for CSV, -d '|' for pipe-delimited files"
  - "Specify multiple fields: -f 1,3,5 or ranges: -f 1-3"
  - "Combine with grep to filter before cutting"
  - "Use tail -n +2 to skip header row"
