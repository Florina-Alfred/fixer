name: Cut Data Analysis
image: python:3.11
category: cut
level: intermediate
goal: "Extract data from CSV/log files using cut"
description: |
  ## Scenario
  Extract data columns using cut.
  
  Files in: /tmp/labs/
  
  ## Tasks
  1. Extract emails from employees.csv → /tmp/labs/emails.txt
  2. Extract errors from server_logs.txt → /tmp/labs/errors.txt
  
  ## Validation
  Run `v` to check

setup:
  - 'python3 /setup/setup.py'
validate:
  - 'python3 /validate/validate.py'
hints:
  - 'cut -d| -f3 /tmp/labs/employees.csv'