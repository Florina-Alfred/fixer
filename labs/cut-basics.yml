name: Cut Basics - Extract Usernames
image: alpine:latest
goal: "Extract usernames (first field) from /data/users.csv and save to /tmp/usernames.txt"
category: cut
level: beginner
setup:
  - "mkdir -p /data"
  - "echo 'alice,John Doe,alice@example.com,Engineering' > /data/users.csv"
  - "echo 'bob,Jane Smith,bob@example.com,Marketing' >> /data/users.csv"
  - "echo 'charlie,Bob Johnson,charlie@example.com,Sales' >> /data/users.csv"
  - "echo 'diana,Alice Brown,diana@example.com,HR' >> /data/users.csv"
  - "echo 'eve,Charlie Wilson,eve@example.com,IT' >> /data/users.csv"
checks:
  - "test -f /tmp/usernames.txt"
  - "grep -q '^alice$' /tmp/usernames.txt"
  - "grep -q '^bob$' /tmp/usernames.txt"
  - "grep -q '^charlie$' /tmp/usernames.txt"
  - "grep -q '^diana$' /tmp/usernames.txt"
  - "grep -q '^eve$' /tmp/usernames.txt"
  - "test $(wc -l < /tmp/usernames.txt) -eq 5"
hints:
  - "Use 'cut' to extract specific fields from lines"
  - "Use '-d' to specify delimiter (comma for CSV)"
  - "Use '-f' to select field number"
  - "Try: cut -d',' -f1 /data/users.csv > /tmp/usernames.txt"
