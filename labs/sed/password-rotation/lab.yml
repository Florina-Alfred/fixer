name: Sed Password Rotation
image: python:3.11
category: sed
level: intermediate
goal: "Rotate passwords using sed"
description: |
  ## Scenario
  Rotate passwords in config files.
  
  Files: /tmp/labs/*.conf
  
  ## Tasks
  1. Rotate database.conf → sed -i 's/OLD/NEW/g'
  2. Rotate api-keys.conf
  
  ## Validation
  Run `v` to check

setup:
  - 'python3 /setup/setup.py'
validate:
  - 'python3 /validate/validate.py'
hints:
  - 'sed -i "s/OLD_PASS/NEW_PASS/g" /tmp/labs/database.conf'