name: Grep Secret Hunter
image: python:3.11
category: grep
level: intermediate
goal: "Extract secrets: AUTH_CODE_9182, SECRET_NUM_7429, API_KEY_xK9mP2nQ, TOKEN_aB3cD4eF5g, MASTER_KEY_3847"
description: |
  ## Scenario
  An attacker left secrets in log files. Find them before they can be exploited.
  
  Log files are in: /tmp/labs/
  
  ## Tasks
  1. Search /tmp/labs/system.log for AUTH_CODE_XXXX → /tmp/auth-code.txt
  2. Search /tmp/labs/app.log for secrets → /tmp/secrets_found.txt  
  3. Search /tmp/labs/security.log for MASTER_KEY → /tmp/master-key.txt
  
  ## Validation
  Run `v` to check

setup:
  - 'python3 /setup/setup.py'
validate:
  - 'python3 /validate/validate.py'
hints:
  - 'grep AUTH_CODE /tmp/labs/system.log'