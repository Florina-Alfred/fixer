name: Log Analyzer
image: python:3.11
category: grep
level: intermediate
goal: "Analyze web logs: extract errors, find 4xx IPs, identify suspicious IP"
description: |
  ## Scenario
  Analyze web server logs to find attackers.
  
  Log files: /tmp/labs/access.log, /tmp/labs/error.log
  
  ## Tasks
  1. Extract errors from error.log → /tmp/labs/errors.txt
  2. Find 4xx requests → /tmp/labs/client_errors.txt
  3. Identify suspicious IP 203.0.113.42 → /tmp/labs/suspicious.txt
  
  ## Validation
  Run `v` to check

setup:
  - 'python3 /setup/setup.py'
validate:
  - 'python3 /validate/validate.py'
hints:
  - 'grep ERROR /tmp/labs/error.log'