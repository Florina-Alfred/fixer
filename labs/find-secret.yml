name: Find the Secret
image: alpine:latest
goal: "Find the hidden secret file and copy it to /tmp/secret_found"
category: find
level: beginner
setup:
  - "mkdir -p /etc/config /var/data /home/admin/.cache"
  - "echo 'This is not the secret' > /etc/config/app.conf"
  - "echo 'Database config here' > /var/data/db.txt"
  - "echo 'CONGRATULATIONS! You found it!' > /home/admin/.cache/.secret_key"
  - "echo 'Random data' > /tmp/random.txt"
checks:
  - "test -f /tmp/secret_found"
  - "grep -q 'CONGRATULATIONS' /tmp/secret_found"
hints:
  - "Look for hidden files with 'ls -la'"
  - "Check common locations like /tmp, /var, /home"
  - "Try 'find / -name '*secret*' 2>/dev/null'"
  - "Hidden files start with a dot (.)"

