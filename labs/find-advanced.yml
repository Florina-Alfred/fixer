name: Find Advanced - Old Log Files
image: alpine:latest
goal: "Find all .log files larger than 1KB in /var/log and save to /tmp/large-logs.txt"
category: find
level: intermediate
setup:
  - "mkdir -p /var/log/app /var/log/system /var/log/debug"
  - "dd if=/dev/zero bs=1024 count=2 2>/dev/null | tr '\\0' 'A' > /var/log/app/app.log"
  - "echo 'small log' > /var/log/app/small.log"
  - "dd if=/dev/zero bs=1024 count=3 2>/dev/null | tr '\\0' 'B' > /var/log/system/sys.log"
  - "dd if=/dev/zero bs=512 count=1 2>/dev/null | tr '\\0' 'C' > /var/log/system/tiny.log"
  - "dd if=/dev/zero bs=1024 count=5 2>/dev/null | tr '\\0' 'D' > /var/log/debug/debug.log"
  - "echo 'tiny' > /var/log/debug/minimal.log"
checks:
  - "test -f /tmp/large-logs.txt"
  - "grep -q '/var/log/app/app.log' /tmp/large-logs.txt"
  - "grep -q '/var/log/system/sys.log' /tmp/large-logs.txt"
  - "grep -q '/var/log/debug/debug.log' /tmp/large-logs.txt"
  - "test $(wc -l < /tmp/large-logs.txt) -eq 3"
  - "! grep -q 'small.log' /tmp/large-logs.txt"
  - "! grep -q 'tiny.log' /tmp/large-logs.txt"
  - "! grep -q 'minimal.log' /tmp/large-logs.txt"
hints:
  - "Use 'find' with '-size' to filter by file size"
  - "Use '+1k' for files larger than 1KB"
  - "Use '-name' to match .log files"
  - "Try: find /var/log -type f -name '*.log' -size +1k > /tmp/large-logs.txt"
