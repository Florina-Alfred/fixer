name: Grep Basics - Find Error Logs
image: alpine:latest
goal: "Find all lines containing 'ERROR' in /var/log/app.log and save to /tmp/errors.txt"
category: grep
level: beginner
setup:
  - "mkdir -p /var/log"
  - "echo '2024-01-01 10:00:00 INFO Application started' > /var/log/app.log"
  - "echo '2024-01-01 10:01:00 DEBUG Processing request' >> /var/log/app.log"
  - "echo '2024-01-01 10:02:00 ERROR Database connection failed' >> /var/log/app.log"
  - "echo '2024-01-01 10:03:00 INFO Retrying connection' >> /var/log/app.log"
  - "echo '2024-01-01 10:04:00 ERROR Timeout occurred' >> /var/log/app.log"
  - "echo '2024-01-01 10:05:00 WARN High memory usage' >> /var/log/app.log"
  - "echo '2024-01-01 10:06:00 ERROR Service unavailable' >> /var/log/app.log"
  - "echo '2024-01-01 10:07:00 INFO Service recovered' >> /var/log/app.log"
checks:
  - "test -f /tmp/errors.txt"
  - "grep -q 'ERROR Database connection failed' /tmp/errors.txt"
  - "grep -q 'ERROR Timeout occurred' /tmp/errors.txt"
  - "grep -q 'ERROR Service unavailable' /tmp/errors.txt"
  - "test $(wc -l < /tmp/errors.txt) -eq 3"
hints:
  - "Use 'grep' to search for patterns in files"
  - "Use '>' to redirect output to a file"
  - "Try: grep 'ERROR' /var/log/app.log > /tmp/errors.txt"
